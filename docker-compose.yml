services:
  app:
    build: .
    container_name: qr-auth-app
    restart: always
    environment:
      - PORT=3000
      - HDREZKA_HOST=hdrezka.ag
    expose:
      - "3000"
    networks:
      - internal

  nginx:
    image: nginx:1.29.5-alpine3.23
    container_name: qr-auth-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
      - /var/log/nginx:/var/log/nginx
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge