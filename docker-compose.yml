services:
  app:
    build: .
    container_name: qr-auth-app
    restart: always
    environment:
      - PORT=3000
      - HDREZKA_HOST=hdrezka.ag
    expose:
      - "3000"

  nginx:
    build: ./nginx
    container_name: qr-auth-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: qr-auth-certbot
    restart: always
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/entrypoint.sh:/entrypoint.sh:ro
    environment:
      - DOMAIN=${DOMAIN}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - STAGING=${STAGING:-0}
    entrypoint: sh /entrypoint.sh
    depends_on:
      - nginx